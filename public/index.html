<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="stylesheet" href="index.css">
    <title>React App</title>
  </head>
  <body>
    <div id ="root">
      <input id = "display" readonly >      
      <div id="keys">
        <button onclick="appendToDiplay('+')" class="opertor-btn">+</button>
        <button onclick="appendToDiplay('7')">7</button>
        <button onclick="appendToDiplay('8')">8</button>
        <button onclick="appendToDiplay('9')">9</button>
        <button onclick="appendToDiplay('-')"class = "opertor-btn">-</button>
        <button onclick="appendToDiplay('4')">4</button>
        <button onclick="appendToDiplay('5')">5</button>
        <button onclick="appendToDiplay('6')">6</button>
        <button onclick="appendToDiplay('*')" class="opertor-btn" >*</button>
        <button onclick="appendToDiplay('1')">1</button>
        <button onclick="appendToDiplay('2')">2</button>
        <button onclick="appendToDiplay('3')">3</button>
        <button onclick="appendToDiplay('/')" class="opertor-btn">/</button>
        <button onclick="appendToDiplay('0')">0</button>
        <button onclick="appendToDiplay('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="clearDisplay()">C</button>
      </div>
    </div>
  </body>
  <script src="App.js"></script>
</html>
